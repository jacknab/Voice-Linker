server {
    listen 80;
    listen [::]:80;
    server_name assicrentals.com www.assicrentals.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name assicrentals.com www.assicrentals.com;

    # SSL certificates (issued by Let's Encrypt / Certbot)
    ssl_certificate     /etc/letsencrypt/live/assicrentals.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/assicrentals.com-0001/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/assicrentals.com-0001/chain.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;

    # Larger body for audio file uploads
    client_max_body_size 50M;

    # Twilio webhooks — /voice/* must respond quickly
    location /voice/ {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Twilio webhooks must respond within 15 seconds
        proxy_read_timeout 15s;
        proxy_connect_timeout 5s;
    }

    # REST API routes
    location /api/ {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Ensure Set-Cookie headers are never buffered — critical for session auth
        proxy_buffering off;
        proxy_pass_header Set-Cookie;
    }

    # Uploaded audio files — cache aggressively (immutable once stored)
    location /uploads/ {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache audio files aggressively — they do not change once uploaded
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # React SPA + WebSocket support
    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Logging
    access_log /var/log/nginx/voice_protocol_access.log;
    error_log  /var/log/nginx/voice_protocol_error.log warn;
}
